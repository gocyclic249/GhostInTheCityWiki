name: Deploy to neocities
on:
  push:
    branches:
      - main # Change to the name of your deployment branch
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Deploy to neocities
      uses: bcomnes/deploy-to-neocities@v1
      with:
        api_token: ${{ secrets.NEOCITIES_API_TOKEN }}
        cleanup: false # Set to true to delete files on Neocities not in your repo
        dist_dir: wiki # The folder in your repo containing your site files

